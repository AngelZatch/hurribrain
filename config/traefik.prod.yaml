log:
  level: DEBUG
api:
  insecure: false
entryPoints:
  web:
    address: :80
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  websecure:
    address: :443
providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: axon
certificatesResolvers:
  le:
   acme:
    email: angelzatch@gmail.com
    storage: /letsencrypt/acme.json
    httpChallenge:
      entryPoint: web