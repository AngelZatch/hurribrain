name: Deploy

on:
  push:
    branches: [main]

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.BUILD_TOKEN }}
      
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Web
        uses: docker/build-push-action@v3
        with:
          context: ./
          file: ./apps/app/Dockerfile
          push: true
          tags: ghcr.io/angelzatch/hurribrain-web:latest
          labels: "org.opencontainers.image.source https://github.com/angelzatch/hurribrain"
          platforms: linux/arm64,linux/amd64
      

      - name: Build and Push API
        uses: docker/build-push-action@v3
        with:
          context: ./
          file: ./apps/api/Dockerfile
          push: true
          tags: ghcr.io/angelzatch/hurribrain-api:latest
          labels: "org.opencontainers.image.source https://github.com/angelzatch/hurribrain"
          platforms: linux/arm64,linux/amd64
  
  deploy:
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5      
      - name: Refresh Compose File
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.DEV_DROPLET_HOST }}
          username: ${{ secrets.DEV_DROPLET_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          source: "docker-compose.prod.yml"
          target: "/"
      - name: Run Compose
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEV_DROPLET_HOST }}
          username: ${{ secrets.DEV_DROPLET_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: "docker compose up -d"