services:
  database:
    image: postgres:16
    environment:
      POSTGRES_DB: hurribrain
      POSTGRES_USER: neuron
      POSTGRES_PASSWORD: synapse
    ports:
      - "5432:5432"
    container_name: hurribrain-postgres
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    container_name: hurribrain-redis
    restart: unless-stopped

volumes:
  pg_data:
