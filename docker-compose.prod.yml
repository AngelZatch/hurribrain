services:
  database:
    image: postgres:16
    environment:
      POSTGRES_DB: hurribrain
      POSTGRES_USER: neuron
      POSTGRES_PASSWORD: synapse
    networks:
      - axon
    container_name: hurribrain-postgres
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7
    networks:
      - axon
    container_name: hurribrain-redis
    restart: unless-stopped

  api:
    networks:
      - axon
    depends_on:
      database:
        condition: service_started
      redis:
        condition: service_started
    ports:
      - "3002:3002"
    environment:
      POSTGRES_HOST: "hurribrain-postgres"
      POSTGRES_USER: neuron
      POSTGRES_PASSWORD: synapse
      REDIS_HOST: "hurribrain-redis"
      PORT: 3002
      HOST: "0.0.0.0"
    container_name: hurribrain-api
    restart: unless-stopped
    labels:
      # Base Traefik
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`api.hurribrain.net`)"
      - "traefik.http.routers.api.entrypoints=web"
      # Middlewares
      - "traefik.http.middlewares.secure-headers.headers.frameDeny=true"
      - "traefik.http.middlewares.secure-headers.headers.sslRedirect=true"
      - "traefik.http.middlewares.secure-headers.headers.browserXssFilter=true"
      - "traefik.http.middlewares.secure-headers.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.secure-headers.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.secure-headers.headers.stsPreload=true"
      - "traefik.http.middlewares.secure-headers.headers.stsSeconds=31536000"
      - "traefik.http.routers.api.middlewares=secure-headers"
      # SSL
      - "traefik.http.routers.api.tls.certresolver=le"
    image: "ghcr.io/angelzatch/hurribrain-api:latest"

  web:
    networks:
      - axon
    container_name: hurribrain-web
    restart: unless-stopped
    labels:
      # Base Traefik
      - "traefik.enable=true"
      - "traefik.http.routers.web.rule=Host(`hurribrain.net`)"
      - "traefik.http.routers.web.entrypoints=web"
      # Middlewares
      - "traefik.http.middlewares.secure-headers.headers.frameDeny=true"
      - "traefik.http.middlewares.secure-headers.headers.sslRedirect=true"
      - "traefik.http.middlewares.secure-headers.headers.browserXssFilter=true"
      - "traefik.http.middlewares.secure-headers.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.secure-headers.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.secure-headers.headers.stsPreload=true"
      - "traefik.http.middlewares.secure-headers.headers.stsSeconds=31536000"
      - "traefik.http.routers.web.middlewares=secure-headers"
      # SSL
      - "traefik.http.routers.web.tls.certresolver=le"
    image: "ghcr.io/angelzatch/hurribrain-web:latest"

  traefik:
    image: traefik:v3.6
    container_name: hurribrain-traefik
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - axon
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    environment:
      - DO_AUTH_TOKEN=${DO_AUTH_TOKEN}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./config/traefik.prod.yaml:/etc/traefik/traefik.yaml:ro
      - ./letsencrypt:/letsencrypt:rw

volumes:
  pg_data:
    
networks:
  axon:
    driver: bridge
